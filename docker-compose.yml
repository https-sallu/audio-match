version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports: [ "8080:8080" ]
    volumes:
      - ./data:/root/data
      - ./dataset:/root/dataset
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports: [ "3000:80" ]
